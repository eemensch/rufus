schema_version: 1
name: rover_capture_pp_vs_cb
description: |
  R0 (pursuer) runs PurePursuitPursuer targeting R1.
  R1 (evader) runs ConstantBearingEvader fleeing directly away
  (bearing_offset = pi). With equal v_max the pursuer should
  close the gap and capture predicate fires; with the evader
  faster (override v_max via the parameters block) the chase
  should run to timeout.

manifest: package://rufus_sim_worlds/config/agents/two_rovers.yaml

agents:
  R0:
    role: pursuer
    strategy:
      type: pure_pursuit_pursuer
      params:
        target: R1
        v_factor: 1.0
        k_psi: 2.0
  R1:
    role: evader
    strategy:
      type: constant_bearing_evader
      params:
        threat: R0
        v_factor: 0.95           # slightly slower to make capture certain
        bearing_offset: 3.14159265358979
        k_psi: 2.0

duration_s: 90.0

termination:
  - id: capture
    expr: "(R0.x - R1.x)**2 + (R0.y - R1.y)**2 < 0.5**2"
    dwell_s: 0.5
    outcome: pursuer_win

  - id: evader_escape
    expr: "R1.x**2 + R1.y**2 > 50**2"
    dwell_s: 0.0
    outcome: evader_win
